# nginx site for hdu.ospdy.com -> the Docker container on 127.0.0.1:8126.
#
# Install:
#   sudo cp deploy/nginx/hdu.ospdy.com.conf /etc/nginx/sites-available/hdu.ospdy.com
#   sudo ln -s /etc/nginx/sites-available/hdu.ospdy.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS: run `sudo certbot --nginx -d hdu.ospdy.com` — certbot fills in the
# ssl_certificate lines below and the http->https redirect automatically. The
# manual versions are shown here in case you manage certs yourself.

# WebSocket upgrade helper. If your nginx already defines a $connection_upgrade
# map elsewhere (it can only be declared once), delete this block.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name hdu.ospdy.com;
    # certbot adds the ACME challenge + redirect; until then, redirect to https.
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name hdu.ospdy.com;

    # certbot manages these two lines:
    ssl_certificate     /etc/letsencrypt/live/hdu.ospdy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hdu.ospdy.com/privkey.pem;

    # Reasonable upload cap; the API payloads are tiny.
    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:8126;
        proxy_http_version 1.1;

        # WebSocket (/api/games/{id}/ws) upgrade.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep long-lived websockets from being culled.
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}
