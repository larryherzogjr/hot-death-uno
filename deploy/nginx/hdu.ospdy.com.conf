# nginx site for hdu.ospdy.com -> the Docker container on 127.0.0.1:8126.
#
# This is HTTP-only on purpose. Install it, reload, then run certbot — certbot
# adds the TLS (443) server block and the http->https redirect itself, using the
# correct directives for your nginx version (so there's no `http2 on;` vs
# `listen ... http2` mismatch, and no reference to certs that don't exist yet):
#
#   sudo cp deploy/nginx/hdu.ospdy.com.conf /etc/nginx/sites-available/HotDeathUno
#   sudo ln -s /etc/nginx/sites-available/HotDeathUno /etc/nginx/sites-enabled/   # if not already
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d hdu.ospdy.com

# WebSocket upgrade helper. If your nginx already defines a $connection_upgrade
# map elsewhere (it can only be declared once), delete this block.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    server_name hdu.ospdy.com;

    client_max_body_size 1m;

    location / {
        proxy_pass http://127.0.0.1:8126;
        proxy_http_version 1.1;

        # WebSocket (/api/games/{id}/ws) upgrade.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep long-lived websockets from being culled.
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }
}
