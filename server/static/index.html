<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hot Death Uno</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Hot Death Uno</h1>
    <div class="newgame">
      <label>Players
        <select id="numPlayers">
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4" selected>4</option>
        </select>
      </label>
      <label>Humans
        <select id="numHumans">
          <option value="1" selected>1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
        </select>
      </label>
      <input id="nameInput" class="nameinput" type="text" placeholder="your name" maxlength="24" />
      <input id="passcode" class="passcode" type="password" placeholder="passcode" hidden />
      <button id="newGameBtn">New game</button>
      <button id="rulesBtn" class="ghost">Rules</button>
      <span id="conn" class="conn"></span>
    </div>
  </header>

  <main id="game" hidden>
    <section id="lobby" class="lobby"></section>
    <section id="status" class="status"></section>

    <section class="table">
      <div id="opponents" class="opponents"></div>
      <div class="play">
        <div id="drawpile" class="pile" title="Draw pile"></div>
        <div id="discard" class="pile discard"></div>
      </div>
      <div id="pending" class="pending"></div>
    </section>

    <section class="me">
      <div class="me-head">Your hand <span id="turnHint" class="turn-hint"></span></div>
      <div id="hand" class="hand"></div>
      <div id="actions" class="actions"></div>
    </section>

    <section id="chat" class="chat">
      <h2>Chat</h2>
      <div id="chatLog" class="chat-log"></div>
      <form id="chatForm" class="chat-form" autocomplete="off">
        <input id="chatInput" type="text" placeholder="Say something…" maxlength="500" />
        <button type="submit">Send</button>
      </form>
    </section>

    <section class="log-wrap">
      <h2>Log</h2>
      <div id="log" class="log"></div>
    </section>

    <div id="banner" class="banner" hidden></div>
  </main>

  <p id="intro" class="intro">Start a new game — you are <b>Player 0</b> versus AI opponents.</p>

  <div id="toast" class="toast" hidden></div>
  <div id="tip" class="tip" hidden></div>

  <div id="rulesModal" class="modal" hidden>
    <div class="modal-box">
      <button id="rulesClose" class="modal-close">×</button>
      <div id="rulesBody"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
