<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Hot Death Uno</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Hot Death Uno</h1>
    <div class="newgame">
      <label>Players
        <select id="numPlayers">
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4" selected>4</option>
        </select>
      </label>
      <label>Humans
        <select id="numHumans">
          <option value="1" selected>1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
        </select>
      </label>
      <span id="auth" class="auth"></span>
      <input id="nameInput" class="nameinput" type="text" placeholder="your name" aria-label="Your name" maxlength="24" />
      <input id="passcode" class="passcode" type="password" placeholder="passcode" aria-label="Game creation passcode" hidden />
      <button id="newGameBtn">New game</button>
      <button id="rulesBtn" class="ghost">Rules</button>
      <span id="conn" class="conn" role="status" aria-live="polite"></span>
    </div>
  </header>

  <main id="game" hidden>
    <section id="lobby" class="lobby"></section>
    <section id="waiting" class="waiting" hidden></section>
    <section id="status" class="status" aria-live="polite"></section>

    <section class="table">
      <div id="opponents" class="opponents"></div>
      <div class="play">
        <div id="drawpile" class="pile" title="Draw pile" aria-label="Draw pile"></div>
        <div id="discard" class="pile discard"></div>
      </div>
      <div id="pending" class="pending" role="status" aria-live="polite"></div>
    </section>

    <section class="me">
      <div class="me-head">Your hand <span id="turnHint" class="turn-hint"></span></div>
      <div id="hand" class="hand"></div>
      <div id="actions" class="actions"></div>
      <div id="meOverlay" class="me-overlay" hidden>
        <div class="me-overlay-title">☠ Eliminated</div>
        <div class="me-overlay-sub">You're out for this hand — back in on the next deal.</div>
      </div>
    </section>

    <section id="chat" class="chat">
      <h2>Chat</h2>
      <div id="chatLog" class="chat-log"></div>
      <form id="chatForm" class="chat-form" autocomplete="off">
        <input id="chatInput" type="text" placeholder="Say something…" aria-label="Chat message" maxlength="500" />
        <button type="submit">Send</button>
      </form>
    </section>

    <section class="log-wrap">
      <h2>Log</h2>
      <div id="log" class="log"></div>
    </section>

    <div id="banner" class="banner" hidden></div>
  </main>

  <p id="intro" class="intro">Start a new game — you are <b>Player 0</b> versus AI opponents.</p>

  <div id="toast" class="toast" role="status" aria-live="assertive" hidden></div>
  <div id="tip" class="tip" role="tooltip" hidden></div>

  <div id="rulesModal" class="modal" role="dialog" aria-modal="true" aria-label="Game rules" hidden>
    <div class="modal-box" tabindex="-1">
      <button id="rulesClose" class="modal-close" aria-label="Close rules">×</button>
      <div id="rulesBody"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
