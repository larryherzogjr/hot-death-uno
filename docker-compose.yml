# Single in-memory game server, fronted by the host's nginx (TLS + wss).
# The published port is bound to localhost only, so the app is reachable solely
# through nginx — never directly from the internet.
services:
  hdu:
    build: .
    image: hdu:latest
    container_name: hdu
    restart: unless-stopped
    # Watched by the autoheal sidecar below: if the container's HEALTHCHECK goes
    # unhealthy (app hung but process alive), it gets restarted. Docker's own
    # restart policy only fires on crash/exit, not on "unhealthy".
    labels:
      - autoheal=true
    ports:
      - "127.0.0.1:8126:8000"
    environment:
      # Set these in a `.env` file next to this compose file (auto-loaded).
      - HDU_PASSCODE=${HDU_PASSCODE:-}   # single shared code; empty = open
      - HDU_AI_DELAY=${HDU_AI_DELAY:-1.2}  # seconds between AI moves
      # Google OAuth sign-in (optional). Blank id/secret = disabled.
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - HDU_BASE_URL=${HDU_BASE_URL:-}
      - HDU_SESSION_SECRET=${HDU_SESSION_SECRET:-}
      - HDU_REQUIRE_LOGIN=${HDU_REQUIRE_LOGIN:-}
      - HDU_ALLOWED_EMAILS=${HDU_ALLOWED_EMAILS:-}
      # Multiple access codes, hand-out/revoke live by editing the file. To use:
      # create ./tokens.txt, then uncomment the volume below and set this.
      # - HDU_TOKENS_FILE=/data/tokens.txt
    # volumes:
    #   - ./tokens.txt:/data/tokens.txt:ro   # bind-mount so edits apply live

  # Restarts any container labelled `autoheal=true` when its HEALTHCHECK reports
  # unhealthy. Scoped by label (not "all"), so it never touches other apps on the
  # host. Needs the Docker socket (read-only) to watch/restart containers.
  autoheal:
    image: willfarrell/autoheal:1.2.0
    container_name: hdu-autoheal
    restart: unless-stopped
    environment:
      - AUTOHEAL_CONTAINER_LABEL=autoheal   # only manage labelled containers
      - AUTOHEAL_INTERVAL=10                 # seconds between health scans
      - AUTOHEAL_START_PERIOD=30             # grace period after a container starts
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
