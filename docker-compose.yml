# Single in-memory game server, fronted by the host's nginx (TLS + wss).
# The published port is bound to localhost only, so the app is reachable solely
# through nginx — never directly from the internet.
services:
  hdu:
    build: .
    image: hdu:latest
    container_name: hdu
    restart: unless-stopped
    ports:
      - "127.0.0.1:8126:8000"
    environment:
      # Set these in a `.env` file next to this compose file (auto-loaded).
      - HDU_PASSCODE=${HDU_PASSCODE:-}   # single shared code; empty = open
      - HDU_AI_DELAY=${HDU_AI_DELAY:-1.2}  # seconds between AI moves
      # Multiple access codes, hand-out/revoke live by editing the file. To use:
      # create ./tokens.txt, then uncomment the volume below and set this.
      # - HDU_TOKENS_FILE=/data/tokens.txt
    # volumes:
    #   - ./tokens.txt:/data/tokens.txt:ro   # bind-mount so edits apply live
